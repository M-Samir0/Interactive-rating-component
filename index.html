<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Document</title>
  </head>
  <body>
    <div class="card">
      <div id="screenOne">
        <div class="starIcon">
          <img
            src="./interactive-rating-component-main/images/icon-star.svg"
            alt=""
          />
        </div>
        <div class="textSection">
          <h3 class="header">How did we do?</h3>
          <p class="paragraph">
            please let us know how we did with your support <br />
            request. All feedback is appreciated to help us <br />
            improve our offering!
          </p>
        </div>
        <div class="ratings">
          <button class="rateBtn">1</button>
          <button class="rateBtn">2</button>
          <button class="rateBtn">3</button>
          <button class="rateBtn">4</button>
          <button class="rateBtn">5</button>
        </div>
        <div class="button">
          <button id="submitBtn">SUBMIT</button>
        </div>
      </div>
      <div id="screenTwo" class="hidden">
        <div class="mobileIcon">
          <img
            src="./interactive-rating-component-main/images/illustration-thank-you.svg"
            alt=""
          />
        </div>
        <div class="userRate">
          <p class="userRateText">
            You selected <span id="rate"></span> out of 5
          </p>
        </div>
        <p class="thanks">Thank you!</p>
        <div class="message">
          <p>
            We appreciate you taking the time to give a rating.<br />if you ever
            need more support, don't hesitate to <br />get in touch!
          </p>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
